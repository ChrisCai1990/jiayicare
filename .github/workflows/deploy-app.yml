name: Deploy App to Vercel

on:
  push:
    branches: [master]
    paths:
      - 'app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build Expo web app
        run: |
          cd app
          npx expo export --platform web --output-dir dist
        env:
          EXPO_PUBLIC_API_URL: https://mongodb-production-06f7.up.railway.app/api

      - name: Deploy to Vercel
        run: npx vercel deploy app/dist --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_jBlK7SOYz0Iwbn6o5mZ2C74j
          VERCEL_PROJECT_ID: prj_Hpi64ghgcpQJxbYgPdq7HdHm3GYw
