name: Build Check - App

on:
  push:
    branches: [master]
    paths:
      - 'app/**'

# Railway 已连接 GitHub，push 后自动构建部署（jiayihui-app 服务）
# 此 workflow 仅做构建验证，不手动部署

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build Expo web app (验证)
        run: |
          cd app
          npx expo export --platform web --output-dir dist
        env:
          EXPO_PUBLIC_API_URL: https://mongodb-production-06f7.up.railway.app/api
