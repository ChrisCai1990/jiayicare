name: Build Check - Admin

on:
  push:
    branches: [master]
    paths:
      - 'admin/**'

# Railway 已连接 GitHub，push 后自动构建部署（jiayihui-admin 服务）
# 此 workflow 仅做构建验证，不手动部署

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build admin (验证)
        run: |
          cd admin
          ../node_modules/.bin/vite build
